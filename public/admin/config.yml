backend:
  name: github
  repo: matousek-petr/petrovnaddesnou
  branch: main
  base_url: https://petrovnaddesnou.vercel.app
  auth_endpoint: api/auth

site_url: https://petrovnaddesnou.vercel.app
display_url: https://petrovnaddesnou.vercel.app
logo_url: /foto/znak.png

media_folder: public/uploads
public_path: /uploads

i18n:
  structure: single_file
  locales: [cs]
  default_locale: cs

collections:
  # ── OBSAH ──────────────────────────────────────────────
  - name: aktuality
    label: Aktuality
    label_singular: Aktualita
    folder: src/content/aktuality
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    fields:
      - { label: Nadpis, name: title, widget: string }
      - { label: Popis, name: description, widget: text }
      - { label: Datum publikace, name: pubDate, widget: datetime }
      - { label: Kategorie, name: category, widget: select, options: [Oznámení, Akce, Doprava, Zastupitelstvo, Ostatní] }
      - { label: Autor, name: author, widget: string, required: false }
      - { label: Obsah, name: body, widget: markdown }

  - name: udalosti
    label: Akce v obci
    label_singular: Akce
    folder: src/content/udalosti
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    fields:
      - { label: Název akce, name: title, widget: string }
      - { label: Datum, name: date, widget: datetime }
      - { label: Čas, name: time, widget: string, required: false, hint: "HH:MM" }
      - { label: Místo, name: location, widget: string }
      - { label: Popis, name: description, widget: text }
      - { label: Typ akce, name: eventType, widget: select, options: [Kultura, Sport, Setkání, Administrativa], required: false }
      - { label: Plakát, name: posterImage, widget: image, required: false }
      - { label: Zobrazit na homepage, name: isFeatured, widget: boolean, default: false }
      - { label: Obsah, name: body, widget: markdown, required: false }

  - name: obcasnik
    label: Občasník
    label_singular: Číslo občasníku
    folder: src/content/obcasnik
    create: true
    slug: "obcasnik-{{fields.number}}-{{year}}-{{month}}"
    format: yaml-frontmatter
    fields:
      - { label: Nadpis, name: title, widget: string, hint: "Např. Občasník č. 56 – červen 2026" }
      - { label: Číslo, name: number, widget: number, value_type: int }
      - { label: Datum vydání, name: pubDate, widget: datetime }
      - { label: PDF soubor, name: fileUrl, widget: file, media_folder: /public/dokumenty, public_folder: /dokumenty }

  - name: uredni_deska
    label: Úřední deska
    label_singular: Dokument
    folder: src/content/uredni_deska
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    fields:
      - { label: Název dokumentu, name: title, widget: string }
      - { label: Datum zveřejnění, name: pubDate, widget: datetime }
      - { label: Kategorie, name: category, widget: string, hint: "Např. Informace z OÚ, Ekonomika obce, Veřejné zakázky" }
      - { label: Číslo jednací, name: reference, widget: string, required: false }
      - { label: URL na PDF, name: fileUrl, widget: string, required: false }
      - { label: URL na detail dokumentu, name: sourceUrl, widget: string, required: false }
      - { label: Archivováno, name: isArchived, widget: boolean, default: false }
      - { label: Obsah, name: body, widget: markdown, required: false }

  # ── LÉKAŘI ─────────────────────────────────────────────
  - name: lekari
    label: Lékaři a ambulance
    label_singular: Lékař / ambulance
    folder: src/content/lekari
    create: true
    slug: "{{slug}}"
    format: yaml
    extension: yaml
    fields:
      - { label: Název / jméno lékaře, name: title, widget: string }
      - { label: Telefon, name: phone, widget: string }
      - { label: Adresa, name: address, widget: string }
      - { label: Datum aktualizace, name: updated, widget: string, hint: "Např. 1. 1. 2025" }
      - name: hours
        label: Ordinační hodiny
        widget: list
        fields:
          - { label: Den, name: day, widget: string, hint: "Pondělí, Úterý…" }
          - name: slots
            label: Časy ordinace
            widget: list
            field: { label: Čas, name: slot, widget: string }

  # ── DATA WEBU (singleton soubory) ──────────────────────
  - name: data-webu
    label: Data webu
    files:
      - name: zamestnanci
        label: Zaměstnanci OÚ
        file: src/content/zamestnanci/seznam.yaml
        format: yaml
        fields:
          - name: contacts
            label: Zaměstnanci
            widget: list
            fields:
              - { label: Funkce, name: role, widget: string }
              - { label: Jméno, name: name, widget: string }
              - { label: Telefon, name: phone, widget: string }
              - { label: "Telefon 2 (volitelný)", name: phone2, widget: string, required: false }
              - { label: Email, name: email, widget: string }

      - name: zastupitele
        label: Zastupitelé obce
        file: src/content/zastupitele/seznam.yaml
        format: yaml
        fields:
          - { label: Volební období, name: volebnObdobi, widget: string, hint: "Např. 2022–2026" }
          - name: members
            label: Zastupitelé
            widget: list
            fields:
              - { label: Jméno, name: name, widget: string }
              - { label: Funkce, name: role, widget: string }

      - name: spolky
        label: Spolky a organizace
        file: src/content/spolky/seznam.yaml
        format: yaml
        fields:
          - name: items
            label: Spolky
            widget: list
            fields:
              - { label: Název, name: name, widget: string }
              - { label: Popis, name: desc, widget: string }
              - { label: Web (URL), name: href, widget: string, required: false }

      - name: uredni-hodiny
        label: Úřední hodiny OÚ
        file: src/content/nastaveni/uredni-hodiny.yaml
        format: yaml
        fields:
          - { label: Poznámka pod tabulkou, name: note, widget: string, required: false }
          - name: hours
            label: Hodiny
            widget: list
            fields:
              - { label: Den, name: day, widget: string }
              - { label: Dopoledne, name: am, widget: string }
              - { label: Odpoledne, name: pm, widget: string }

      - name: odpad
        label: Svoz odpadu
        file: src/content/nastaveni/odpad.yaml
        format: yaml
        fields:
          - name: items
            label: Druhy odpadu
            widget: list
            fields:
              - { label: Druh odpadu, name: type, widget: string }
              - { label: Harmonogram, name: schedule, widget: string }

      - name: kontakt
        label: Kontaktní údaje obce
        file: src/content/nastaveni/kontakt.yaml
        format: yaml
        fields:
          - { label: Adresa (ulice a číslo), name: address, widget: string }
          - { label: Město a PSČ, name: city, widget: string }
          - { label: Telefon, name: phone, widget: string }
          - { label: Email podatelny, name: email, widget: string }
          - { label: IČO, name: ico, widget: string }
          - { label: Datová schránka (ID), name: ds, widget: string }
          - { label: Formspree URL (kontaktní formulář), name: formspree, widget: string }
          - { label: Tagline (popis v patičce), name: tagline, widget: string }

      - name: o-obci
        label: Stránka „O obci" – text
        file: src/content/stranky/o-obci.md
        format: yaml-frontmatter
        fields:
          - { label: Nadpis, name: title, widget: string }
          - { label: Popis (meta), name: description, widget: string, required: false }
          - { label: Obsah stránky, name: body, widget: markdown }
